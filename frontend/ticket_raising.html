<!-- MAIN CONTENT -->
<main class="flex-1 overflow-y-auto px-4 md:px-8 py-10 bg-[#050505] relative">
  <div class="glass-card w-full max-w-4xl mx-auto p-6 md:p-10 shadow-2xl relative overflow-hidden">
    <div class="absolute -top-24 -right-24 w-56 h-56 bg-yellow-400/10 rounded-full blur-3xl"></div>

    <div class="relative z-10">
      <div class="flex items-center gap-4 mb-8">
        <a href="cases.html" class="p-2 bg-white/5 rounded-full hover:bg-white/10 transition-colors">
          <i data-feather="arrow-left" class="w-5 h-5 text-yellow-400"></i>
        </a>
        <div>
          <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight">Raise Support Ticket</h1>
          <p class="text-gray-500 text-sm mt-1">Please provide the details of your request.</p>
        </div>
      </div>

      <form id="ticketForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="space-y-2 md:col-span-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Ticket Title</label>
            <input type="text" name="title" required placeholder="Brief summary of the issue" class="w-full px-4 py-4 rounded-2xl text-sm">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Customer Name</label>
            <input type="text" name="customerName" required placeholder="Full Name" class="w-full px-4 py-4 rounded-2xl text-sm">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Email Address</label>
            <input type="email" name="email" required placeholder="contact@domain.com" class="w-full px-4 py-4 rounded-2xl text-sm">
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Priority</label>
            <select name="priority" class="w-full px-4 py-4 rounded-2xl text-sm">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
              <option value="Urgent">Urgent</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Department</label>
            <select name="type" class="w-full px-4 py-4 rounded-2xl text-sm">
              <option value="Technical">Technical</option>
              <option value="Sales">Sales</option>
              <option value="Billing">Billing</option>
              <option value="Support">Support</option>
            </select>
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Description</label>
          <textarea name="description" rows="5" required placeholder="Detailed explanation of your issue..." class="w-full px-4 py-4 rounded-2xl resize-none text-sm"></textarea>
        </div>

        <button type="submit" class="w-full bg-yellow-400 hover:bg-yellow-500 text-black py-4 rounded-2xl text-sm font-black uppercase tracking-widest transition-all shadow-lg shadow-yellow-400/20 transform hover:-translate-y-1">
          Submit Ticket
        </button>
      </form>
    </div>
  </div>
</main>

<script>
  feather.replace();

  const currentUser = VelvoraxAuth.getUser();
  if (currentUser) {
    const customerNameInput = document.querySelector('input[name="customerName"]');
    const emailInput = document.querySelector('input[name="email"]');
    if (customerNameInput && currentUser.name) customerNameInput.value = currentUser.name;
    if (emailInput && currentUser.email) emailInput.value = currentUser.email;
  }

  document.getElementById("ticketForm").onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    try {
      const token = localStorage.getItem("token");
      if (!token) {
        alert("Please login first");
        return;
      }

      const response = await fetch(`${CONFIG.API_BASE_URL}/api/tickets`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-auth-token": token
        },
        body: JSON.stringify(data)
      });

      if (!response.ok) {
        const clone = response.clone();
        let errorText;
        try {
          const error = await response.json();
          errorText = error.msg || error.message || 'Failed to create ticket';
        } catch (parseErr) {
          errorText = await clone.text();
        }
        throw new Error(errorText);
      }

      alert("Ticket submitted successfully!");
      e.target.reset();
      window.location.href = "cases.html";

    } catch (err) {
      console.error("ERROR:", err);
      alert(`Failed to submit ticket\n\nReason: ${err.message}`);
    }
  };
</script>
