<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standard Registration - Velvorax Platform</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="js/config.js"></script>

    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(250,204,21,0.08), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255,255,255,0.03), transparent 30%),
                #020205;
            font-family: Arial, Helvetica, sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 28px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .form-input {
            width: 100%;
            background: linear-gradient(
                145deg,
                rgba(255,255,255,0.04),
                rgba(255,255,255,0.02)
            );
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 0.95rem 1rem;
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            appearance: none;
        }

        .form-input::placeholder {
            color: #6b7280;
        }

        .form-input:hover {
            border-color: rgba(250,204,21,0.25);
            background: rgba(255,255,255,0.05);
        }

        .form-input:focus {
            border-color: #facc15;
            outline: none;
            background: rgba(255,255,255,0.06);
            box-shadow:
                0 0 0 4px rgba(250,204,21,0.08),
                0 10px 30px rgba(250,204,21,0.08);
        }

        /* Dropdown Fix */
        select.form-input {
            background-color: #111827;
            color: #ffffff;
            cursor: pointer;
        }

        select.form-input option {
            background-color: #0f172a;
            color: #ffffff;
            padding: 12px;
        }

        .form-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            margin-bottom: 0.7rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #facc15, #fde047);
            color: #000000;
            font-weight: 800;
            letter-spacing: 0.03em;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(250,204,21,0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(250,204,21,0.3);
        }

        .logo-glow {
            box-shadow:
                0 0 25px rgba(250,204,21,0.15),
                0 0 60px rgba(250,204,21,0.08);
        }

        .input-icon {
            color: #facc15;
            opacity: 0.85;
        }

        .top-shine {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(255,255,255,0.05),
                transparent
            );
            border-radius: 28px;
            pointer-events: none;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex items-center justify-center py-12 px-4">

<div class="max-w-md w-full">

    <!-- Logo -->
    <div class="text-center mb-10">
        <a href="index.html" class="inline-flex flex-col items-center group">
            <img
                    src="assets/logo.jpg"
                    alt="Logo"
                    class="w-16 h-16 rounded-full border border-yellow-400/20 mb-4 logo-glow"
            >

            <h1 class="text-2xl font-bold text-white tracking-tight uppercase">
                Velvorax
                <span class="text-yellow-400">Team</span>
            </h1>

            <p class="text-[0.6rem] text-gray-500 tracking-[0.3em] uppercase mt-1">
                Enterprise Staff Portal
            </p>
        </a>
    </div>

    <!-- Card -->
    <div class="glass-card p-8 shadow-2xl relative overflow-hidden">

        <div class="top-shine"></div>

        <div class="mb-8 relative z-10">
            <h2 class="text-2xl font-bold text-white">
                Standard Registration
            </h2>

            <p class="text-sm text-gray-400 mt-2">
                Join your organization from the list below.
            </p>
        </div>

        <!-- Form -->
        <form id="standard-register-form" class="space-y-6 relative z-10">

            <!-- Company -->
            <div>
                <label class="form-label">
                    Select Company
                    <span class="text-yellow-400">*</span>
                </label>

                <div class="relative">

                        <span class="absolute left-4 top-1/2 -translate-y-1/2 input-icon z-10">
                            <i data-feather="briefcase" class="w-4 h-4"></i>
                        </span>

                    <select
                            id="companyId"
                            class="form-input pl-12 pr-12"
                            required
                    >
                        <option value="">Loading companies...</option>
                    </select>

                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
                            <i data-feather="chevron-down" class="w-4 h-4"></i>
                        </span>

                </div>
            </div>

            <!-- Name -->
            <div>
                <label class="form-label">Full Name</label>

                <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 input-icon z-10">
                            <i data-feather="user" class="w-4 h-4"></i>
                        </span>

                    <input
                            type="text"
                            id="name"
                            class="form-input pl-12"
                            placeholder="Enter your full name"
                            required
                    >
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="form-label">Email Address</label>

                <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 input-icon z-10">
                            <i data-feather="mail" class="w-4 h-4"></i>
                        </span>

                    <input
                            type="email"
                            id="email"
                            class="form-input pl-12"
                            placeholder="name@company.com"
                            required
                    >
                </div>
            </div>

            <!-- Phone -->
            <div>
                <label class="form-label">Phone Number</label>

                <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 input-icon z-10">
                            <i data-feather="phone" class="w-4 h-4"></i>
                        </span>

                    <input
                            type="tel"
                            id="phone"
                            class="form-input pl-12"
                            placeholder="+91 00000 00000"
                            required
                    >
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="form-label">Password</label>

                <div class="relative">

                        <span class="absolute left-4 top-1/2 -translate-y-1/2 input-icon z-10">
                            <i data-feather="lock" class="w-4 h-4"></i>
                        </span>

                    <input
                            type="password"
                            id="password"
                            class="form-input pl-12 pr-12"
                            placeholder="Create a password"
                            required
                    >

                    <button
                            type="button"
                            onclick="togglePass()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-yellow-400 transition"
                    >
                        <i data-feather="eye" id="eyeIcon" class="w-4 h-4"></i>
                    </button>

                </div>
            </div>

            <!-- Submit -->
            <button
                    type="submit"
                    class="w-full py-4 btn-primary rounded-2xl flex items-center justify-center group"
            >
                <span>Join Organization</span>

                <i
                        data-feather="arrow-right"
                        class="w-4 h-4 ml-2 transition-transform group-hover:translate-x-1"
                ></i>
            </button>

        </form>

        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-white/5 text-center relative z-10">
            <p class="text-sm text-gray-400">
                Already have an account?

                <a
                        href="login.html"
                        class="text-yellow-400 font-bold hover:underline"
                >
                    Sign In
                </a>
            </p>
        </div>

    </div>
</div>

<script>

    feather.replace();

    async function loadCompanies() {

        try {

            const res = await fetch(
                `${CONFIG.API_BASE_URL}/api/user-auth/companies`
            );

            const companies = await res.json();

            const select = document.getElementById('companyId');

            select.innerHTML =
                '<option value="">Select Your Company</option>';

            companies.forEach(c => {

                const option = document.createElement('option');

                option.value = c._id;

                option.textContent =
                    c.companyName ||
                    c.name ||
                    "Unnamed Company";

                select.appendChild(option);

            });

        } catch (err) {

            console.error('Failed to load companies', err);

        }
    }

    document
        .getElementById('standard-register-form')
        .addEventListener('submit', async (e) => {

            e.preventDefault();

            const formData = {

                companyId:
                    document.getElementById('companyId').value,

                name:
                    document.getElementById('name').value.trim(),

                email:
                    document.getElementById('email').value.trim(),

                phone:
                    document.getElementById('phone').value.trim(),

                password:
                    document.getElementById('password').value

            };

            try {

                const response = await fetch(
                    `${CONFIG.API_BASE_URL}/api/user-auth/register`,
                    {
                        method: 'POST',

                        headers: {
                            'Content-Type': 'application/json'
                        },

                        body: JSON.stringify(formData)
                    }
                );

                const result = await response.json();

                if (response.ok) {

                    alert(
                        'Registration Successful! Your account is pending admin approval.'
                    );

                    window.location.href = 'login.html';

                } else {

                    alert(result.msg || 'Registration failed');

                }

            } catch (error) {

                alert('Server connection error.');

            }

        });

    function togglePass() {

        const passInput =
            document.getElementById('password');

        const eyeIcon =
            document.getElementById('eyeIcon');

        passInput.type =
            passInput.type === 'password'
                ? 'text'
                : 'password';

        eyeIcon.setAttribute(
            'data-feather',
            passInput.type === 'password'
                ? 'eye'
                : 'eye-off'
        );

        feather.replace();

    }

    window.onload = loadCompanies;

</script>

</body>
</html>
